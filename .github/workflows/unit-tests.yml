name: Unit tests

on:
  pull_request: # triggers on PR open or update
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: "30 9 * * 1" # every Monday at 0930 UTC

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false # don't cancel other jobs if one fails here
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install peaks with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with pytest
        run: pytest
